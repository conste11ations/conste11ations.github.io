name: refresh-houses

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'City name (must match a value in CITIES constant)'
        required: true
        type: string
      raw_json:
        description: 'Raw HonestDoor/Repliers listing JSON (pageProps object or listing object)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install

      - name: Transform listing and update houses.json
        run: echo '${{ inputs.raw_json }}' | node scripts/transform-listing.js '${{ inputs.city }}'

      - name: Commit updated houses.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/houses.json
          git diff --cached --quiet || git commit -m "chore: refresh ${{ inputs.city }} houses"

      - name: Build and export
        run: yarn export

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          enable_jekyll: false
